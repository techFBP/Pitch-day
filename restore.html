function restore() {
  var status = document.getElementById('status');
  try {
    var existing = JSON.parse(localStorage.getItem('pitchday_v3') || '{}');
    existing.players = PLAYERS;
    existing.sessions = SESSIONS;
    existing.fund = existing.fund || {contributions:[], expenses:[]};
    existing.format = existing.format || 7;
    existing.confirmed = existing.confirmed || [];
    existing.lastTeams = existing.lastTeams || null;
    existing.sessionDate = existing.sessionDate || new Date().toISOString().split('T')[0];
    localStorage.setItem('pitchday_v3', JSON.stringify(existing));
    status.innerHTML = '<strong style="color:green">Done! Restored ' + PLAYERS.length + ' players and ' + SESSIONS.length + ' sessions.</strong><br>Now go to <a href="https://techfbp.github.io/Pitch-day/">your app</a> and refresh.';
  } catch(e) {
    status.innerHTML = '<strong style="color:red">Error: ' + e.message + '</strong>';
  }
}
